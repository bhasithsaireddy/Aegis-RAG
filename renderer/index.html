<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <script>
    (() => {
      const storageKey = 'aegis-rag-theme'
      const systemTheme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'

      let theme = systemTheme

      try {
        const storedTheme = window.localStorage.getItem(storageKey)
        if (storedTheme === 'dark' || storedTheme === 'light') {
          theme = storedTheme
        }
      } catch {
        theme = systemTheme
      }

      document.documentElement.dataset.theme = theme
      document.documentElement.style.colorScheme = theme
    })()
  </script>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 http://192.168.200.1:8000; font-src 'self'; img-src 'self' data: blob:;">
  <title>Aegis RAG — Offline Multimodal Intelligence Workspace</title>
  <!-- All fonts are bundled locally, no external dependencies -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
